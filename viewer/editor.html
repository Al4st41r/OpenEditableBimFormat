<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OEBF Editor</title>
  <link rel="icon" href="/oebf/icons/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #ddd; font-family: 'Barlow', sans-serif; font-size: 13px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    #toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; background: #222; border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    #toolbar button {
      padding: 4px 8px; cursor: pointer; background: #333; color: #ddd;
      border: 1px solid #555; border-radius: 3px;
      display: flex; align-items: center; gap: 4px;
    }
    #toolbar button:hover { background: #3a3a3a; }
    #toolbar button.active { background: #2a4a6a; border-color: #4a8aaa; }
    #toolbar button:disabled { opacity: 0.4; cursor: default; }
    .toolbar-sep { width: 1px; background: #444; height: 22px; margin: 0 4px; }
    #toolbar select { background: #333; color: #ddd; border: 1px solid #555; padding: 3px 6px; border-radius: 3px; font-size: 12px; }
    #toolbar label { font-size: 11px; opacity: 0.6; }
    #status-bar { margin-left: auto; font-size: 11px; opacity: 0.5; }

    #main { display: flex; flex: 1; overflow: hidden; }

    #scene-tree {
      width: 220px; flex-shrink: 0; background: #1e1e1e;
      border-right: 1px solid #333; overflow-y: auto; padding: 8px 0;
      display: flex; flex-direction: column;
    }
    #scene-tree-body { flex: 1; overflow-y: auto; }
    #scene-tree-footer {
      flex-shrink: 0; padding: 6px 10px 8px;
      border-top: 1px solid #2a2a2a;
    }
    #scene-tree-filename {
      font-size: 11px; color: #aaa; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px;
    }
    #scene-tree-version { font-size: 10px; color: #555; }
    .tree-section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 10px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; opacity: 0.5; letter-spacing: 0.08em;
      cursor: pointer; user-select: none;
    }
    .tree-section-header:hover { opacity: 0.8; }
    .tree-section-add {
      background: none; border: none; color: #8f8; cursor: pointer;
      font-size: 14px; padding: 0 2px; opacity: 0.7;
    }
    .tree-section-add:hover { opacity: 1; }
    .tree-items { padding: 0; }
    .tree-item {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 10px 3px 20px; cursor: pointer; font-size: 12px;
    }
    .tree-item:hover { background: #2a2a2a; }
    .tree-item.active { background: #2a3a4a; }
    .tree-item-eye { background: none; border: none; color: #888; cursor: pointer; font-size: 12px; margin-left: auto; padding: 0 2px; }
    .tree-item-eye:hover { color: #ddd; }
    .tree-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    #viewport { flex: 1; position: relative; overflow: hidden; }
    #canvas { display: block; width: 100%; height: 100%; }

    #props-panel {
      width: 280px; flex-shrink: 0; background: #1e1e1e;
      border-left: 1px solid #333; overflow-y: auto; padding: 0;
      transition: width 0.15s ease, padding 0.15s ease;
      position: relative;
    }
    #props-panel.collapsed {
      width: 28px; padding: 0; overflow: hidden;
    }
    #props-panel.collapsed > *:not(#props-toggle) { display: none; }
    #props-toggle {
      position: absolute; top: 6px; left: 4px;
      background: none; border: none; color: #888; cursor: pointer;
      font-size: 14px; padding: 2px 4px; line-height: 1;
    }
    #props-toggle:hover { color: #ddd; }
    #props-panel:not(.collapsed) #props-toggle { left: unset; right: 4px; }
    #props-panel h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; opacity: 0.5; margin-bottom: 10px; margin-top: 18px; letter-spacing: 0.08em; }
    .prop-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .prop-row label { font-size: 11px; opacity: 0.6; }
    .prop-row input, .prop-row select {
      background: #2a2a2a; color: #ddd; border: 1px solid #444;
      padding: 4px 8px; border-radius: 3px; font-family: 'Barlow', sans-serif; font-size: 12px;
    }
    .prop-row button {
      padding: 5px 10px; cursor: pointer; background: #2a4a2a; color: #8f8;
      border: 1px solid #555; border-radius: 3px; font-size: 12px;
    }
    #props-empty { opacity: 0.4; font-size: 12px; padding: 8px 0; }

    .mat-swatch {
      width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.15);
    }

    #welcome-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
    }
    #welcome-overlay.hidden { display: none; }
    #welcome-box {
      background: #222; border: 1px solid #444; border-radius: 6px;
      padding: 32px 40px; text-align: center; min-width: 320px;
    }
    #welcome-box h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: #ddd; }
    #welcome-box p  { font-size: 12px; opacity: 0.5; margin-bottom: 28px; }
    #welcome-box .welcome-btns { display: flex; gap: 12px; justify-content: center; }
    #welcome-box .welcome-btns button {
      padding: 8px 20px; font-size: 13px; cursor: pointer;
      border-radius: 3px; border: 1px solid #555;
    }
    #welcome-new  { background: #2a4a6a; color: #ddd; border-color: #4a8aaa; }
    #welcome-new:hover  { background: #3a5a7a; }
    #welcome-open { background: #333; color: #ddd; }
    #welcome-open:hover { background: #3a3a3a; }
  </style>
</head>
<body>
  <div id="welcome-overlay">
    <div id="welcome-box">
      <h1>OEBF Editor</h1>
      <p>Open Editable BIM Format</p>
      <div class="welcome-btns">
        <button id="welcome-new">New project</button>
        <button id="welcome-open">Open project</button>
      </div>
    </div>
  </div>
  <div id="toolbar">
    <button id="new-btn" aria-label="New bundle">New</button>
    <button id="open-btn" aria-label="Open bundle">
      <img src="/oebf/icons/folder.svg" width="16" height="16" alt=""> Open
    </button>
    <button id="save-btn" disabled aria-label="Save">
      <img src="/oebf/icons/save.svg" width="16" height="16" alt=""> Save
    </button>
    <div class="toolbar-sep"></div>
    <button id="tool-select" class="active" aria-label="Select tool"><img src="/oebf/icons/select.svg" width="16" height="16" alt=""> Select</button>
    <button id="tool-wall" disabled aria-label="Wall tool"><img src="/oebf/icons/draw-line.svg" width="16" height="16" alt=""> Wall</button>
    <button id="tool-floor" disabled aria-label="Floor tool"><img src="/oebf/icons/draw-rect.svg" width="16" height="16" alt=""> Floor</button>
    <button id="tool-storey" aria-label="Add storey"><img src="/oebf/icons/storey.svg" width="16" height="16" alt=""> Storey</button>
    <button id="tool-grid" disabled aria-label="Add grid axis"><img src="/oebf/icons/grid.svg" width="16" height="16" alt=""> Grid</button>
    <button id="tool-guide" disabled aria-label="Add guide"><img src="/oebf/icons/align.svg" width="16" height="16" alt=""> Guide</button>
    <div class="toolbar-sep"></div>
    <button id="view-3d" class="active" aria-label="3D view"><img src="/oebf/icons/plane-vertical.svg" width="16" height="16" alt=""> 3D</button>
    <button id="view-plan" aria-label="Plan view"><img src="/oebf/icons/plane-horizontal.svg" width="16" height="16" alt=""> Plan</button>
    <div class="toolbar-sep"></div>
    <button id="render-solid"       title="Solid shaded view"                   aria-label="Solid view">Solid</button>
    <button id="render-lines"       title="Line drawing"                        aria-label="Line drawing">Lines</button>
    <button id="render-solid-edges" class="active" title="Solid with edge overlay" aria-label="Solid with edges">S+E</button>
    <div class="toolbar-sep"></div>
    <button id="lib-btn" title="Material library">Library</button>
    <div class="toolbar-sep"></div>
    <button id="ifc-btn" title="IFC import / export">IFC</button>
    <div class="toolbar-sep"></div>
    <label for="units-select" style="font-size:11px;opacity:0.6;">Units:</label>
    <select id="units-select" title="Display units">
      <option value="mm" selected>mm</option>
      <option value="m">m</option>
    </select>
    <span id="status-bar">No bundle open</span>
  </div>

  <div id="main">
    <div id="scene-tree">
      <div id="scene-tree-body">
        <div class="tree-section-header">
          Storeys
          <button class="tree-section-add" id="add-storey-btn" title="Add storey">+</button>
        </div>
        <div class="tree-items" id="storeys-list"></div>

        <div class="tree-section-header">
          Reference Grids
          <button class="tree-section-add" id="add-grid-btn" disabled title="Add grid axis">+</button>
        </div>
        <div class="tree-items" id="grids-list"></div>

        <div class="tree-section-header">
          Reference Lines
          <button class="tree-section-add" id="add-guide-btn" disabled title="Add vertical guide">+</button>
          <button class="tree-section-add" id="add-height-guide-btn" disabled title="Add horizontal height guide">H</button>
        </div>
        <div class="tree-items" id="guides-list"></div>

        <div class="tree-section-header">
          Elements
        </div>
        <div class="tree-items" id="elements-list"></div>

        <div class="tree-section-header">
          Details
          <button class="tree-section-add" id="add-detail-btn" disabled title="Add detail">+</button>
        </div>
        <div class="tree-items" id="details-list"></div>

        <div class="tree-section-header">
          Materials
          <button class="tree-section-add" id="add-material-btn" disabled title="Add material">+</button>
        </div>
        <div class="tree-items" id="materials-list"></div>
      </div>
      <div id="scene-tree-footer">
        <div id="scene-tree-filename">No bundle open</div>
        <div id="scene-tree-version"></div>
      </div>
    </div>

    <div id="viewport">
      <canvas id="canvas"></canvas>
    </div>

    <div id="props-panel">
      <button id="props-toggle" title="Toggle properties panel">›</button>
      <div id="tool-options" style="display:none;padding:8px 12px 0;border-bottom:1px solid #2a2a2a;">
        <div class="prop-row" id="wall-profile-row" style="display:none">
          <label>Wall profile</label>
          <select id="default-wall-profile" disabled style="background:#2a2a2a;color:#ddd;border:1px solid #444;padding:4px 8px;border-radius:3px;font-size:12px;"><option>— none —</option></select>
        </div>
        <div class="prop-row" id="slab-profile-row" style="display:none">
          <label>Slab profile</label>
          <select id="default-slab-profile" disabled style="background:#2a2a2a;color:#ddd;border:1px solid #444;padding:4px 8px;border-radius:3px;font-size:12px;"><option>— none —</option></select>
        </div>
      </div>
      <div id="props-content" style="padding:12px">
        <p id="props-empty">Select an element to see properties.</p>
      </div>
    </div>
  </div>

  <script type="module" src="/src/editor/editor.js"></script>
  <script>
    const propsPanel  = document.getElementById('props-panel');
    const propsToggle = document.getElementById('props-toggle');
    propsToggle.addEventListener('click', () => {
      const collapsed = propsPanel.classList.toggle('collapsed');
      propsToggle.textContent = collapsed ? '‹' : '›';
    });
  </script>
</body>
</html>
