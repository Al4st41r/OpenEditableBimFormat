<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OEBF Viewer</title>
  <link rel="icon" href="/oebf/icons/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; overflow: hidden; }
    #canvas { display: block; width: 100vw; height: 100vh; }
    #ui {
      position: absolute; top: 16px; left: 16px;
      color: #fff; font-family: 'Barlow', sans-serif; font-size: 13px;
    }
    #ui button {
      padding: 6px 12px; cursor: pointer; background: #333; color: #fff;
      border: 1px solid #555; border-radius: 3px; margin-right: 8px;
      display: inline-flex; align-items: center; gap: 6px;
    }
    #ui button:hover { background: #444; }
    #status { margin-top: 8px; opacity: 0.6; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="ui">
    <button id="load-demo-btn">Load demo</button>
    <button id="open-dir-btn"><img src="/oebf/icons/folder.svg" width="16" height="16" alt=""> Open .oebf folder</button>
    <button id="open-file-btn"><img src="/oebf/icons/import.svg" width="16" height="16" alt=""> Open .oebfz</button>
    <button id="edit-profiles-btn" disabled><img src="/oebf/icons/layers.svg" width="16" height="16" alt=""> View profiles</button>
    <p id="status">No project loaded</p>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
