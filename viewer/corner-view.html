<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OEBF — SW Corner View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; overflow: hidden; }
    #canvas { display: block; width: 100vw; height: 100vh; }
    #status { position: absolute; top: 16px; left: 16px; color: #fff;
               font-family: monospace; font-size: 13px; opacity: 0.8; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="status">Loading…</div>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls }         from 'three/addons/controls/OrbitControls.js';
    import { loadBundle }            from '/src/loader/loadBundle.js';
    import { buildThreeMesh }        from '/src/scene/buildMesh.js';
    import { applyJunctionClipping } from '/src/junction-renderer.js';

    function makeFetchHandle(basePath) {
      return {
        getDirectoryHandle: async (name) => makeFetchHandle(`${basePath}/${name}`),
        getFileHandle: async (name) => ({
          getFile: async () => ({
            text: async () => {
              const res = await fetch(`${basePath}/${name}`);
              if (!res.ok) throw new Error(`Not found: ${basePath}/${name}`);
              return res.text();
            },
          }),
        }),
      };
    }

    const canvas   = document.getElementById('canvas');
    const statusEl = document.getElementById('status');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.localClippingEnabled = true;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    // Camera aimed at the SW corner from outside — x=0, y=0
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 500);
    camera.up.set(0, 0, 1);
    camera.position.set(-1.2, -1.2, 2.2);

    const controls = new OrbitControls(camera, canvas);
    controls.target.set(0.3, 0.3, 1.35);
    controls.update();

    const grid = new THREE.GridHelper(20, 20, 0x444444, 0x333333);
    grid.rotation.x = Math.PI / 2;
    scene.add(grid);

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    try {
      const dirHandle = makeFetchHandle('/terraced-house.oebf');
      const { meshes, manifest, junctions } = await loadBundle(dirHandle);

      const group = new THREE.Group();
      group.name = manifest.project_name;
      for (const md of meshes) group.add(buildThreeMesh(md));
      applyJunctionClipping(group, junctions);
      scene.add(group);

      statusEl.textContent =
        `SW corner view — ${junctions.length} junction(s) active`;
    } catch (err) {
      statusEl.textContent = `Error: ${err.message}`;
      console.error(err);
    }
  </script>
</body>
</html>
